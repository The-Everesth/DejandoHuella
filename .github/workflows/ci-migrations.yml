name: CI Migrations Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  migrations-guard:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dejandohuella_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: dejandohuella_ci
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql
          coverage: none

      - name: Copy environment
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            php -r "try { new PDO('mysql:host=127.0.0.1;port=3306;dbname=dejandohuella_ci','root','root'); echo 'ok'; exit(0);} catch (Throwable $e) { exit(1);}"
            if [ $? -eq 0 ]; then
              break
            fi
            sleep 2
          done

      - name: Clear config cache
        run: php artisan optimize:clear

      - name: Fresh migrate and seed
        run: php artisan migrate:fresh --seed --no-interaction

      - name: Run tests
        run: php artisan test --no-interaction
